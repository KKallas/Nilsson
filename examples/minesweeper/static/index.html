<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Minesweeper Arena</title>
<style>
  body{margin:0;background:#0d1117;color:#c9d1d9;font-family:system-ui,sans-serif;
       text-align:center}
  h1{font-size:18px;margin:10px}
  #bar{margin:8px;font-size:14px;min-height:20px}
  #scores{display:flex;justify-content:center;gap:24px;margin:6px;font-weight:600}
  #board{display:inline-grid;gap:2px;margin:10px;touch-action:manipulation}
  .c{width:30px;height:30px;border:0;border-radius:4px;font-size:15px;
     font-weight:700;cursor:pointer;background:#30363d;color:#c9d1d9;
     display:flex;align-items:center;justify-content:center;user-select:none}
  .c.open{background:#161b22;color:#8b949e;cursor:default}
  .c.mine{background:#7d1d1d;cursor:default}
  .c.flag{background:#1f6feb}
  .c.flag.mine-other{background:#8957e5}
  .c.pending{background:#9e6a03;font-size:12px}
  .c.n1{color:#58a6ff}.c.n2{color:#3fb950}.c.n3{color:#f85149}
  .c.n4{color:#a371f7}.c.n5{color:#db6d28}.c.n6{color:#39c5cf}
  #pw{margin:10px}
  #pw button{margin:3px;padding:8px 12px;border:0;border-radius:6px;
     background:#21262d;color:#c9d1d9;cursor:pointer;font-size:13px}
  #pw button.armed{background:#1f6feb;color:#fff}
  #flagbtn{padding:10px 18px;border:0;border-radius:8px;font-size:15px;
     font-weight:700;cursor:pointer;background:#21262d;color:#c9d1d9;margin:6px}
  #flagbtn.on{background:#1f6feb;color:#fff}
  input,#name button{padding:8px;border-radius:6px;border:1px solid #30363d;
     background:#161b22;color:#c9d1d9}
  a{color:#58a6ff}
</style>
</head>
<body>
<h1>💣 Minesweeper Arena</h1>
<div id="name">
  <input id="nm" placeholder="your name" maxlength="16">
  <button onclick="join()">Join</button>
  &nbsp;<a href="/qr" target="_blank">invite (QR)</a>
</div>
<div id="scores"></div>
<div id="bar"></div>
<div id="pw"></div>
<div><button id="flagbtn" onclick="toggleFlag()">🚩 Flag mode: OFF</button></div>
<div id="board"></div>

<script>
const pid = (document.cookie.match(/pid=([a-f0-9]+)/) || [])[1] || "";
let ws, S = null, joined = false, flagMode = false;
function toggleFlag(){ flagMode = !flagMode; render(); }

function connect() {
  ws = new WebSocket(`ws://${location.host}/ws?pid=${pid}`);
  ws.onmessage = e => { S = JSON.parse(e.data); render(); };
  ws.onclose = () => setTimeout(connect, 1000);
}
function send(o){ ws && ws.readyState === 1 && ws.send(JSON.stringify(o)); }
function join(){
  const n = document.getElementById('nm').value.trim() || 'Player';
  send({t:'join', name:n}); joined = true;
  document.getElementById('name').style.display = 'none';
}
function arm(k){ send({t:'arm', k}); }

function render(){
  if(!S) return;
  // scores
  document.getElementById('scores').innerHTML = S.players.map(p =>
    `<span style="color:${p.is_you?'#58a6ff':'#db6d28'}">${p.name}${p.is_you?' (you)':''}: ${p.score}</span>`
  ).join('');
  // status bar
  let bar = '';
  if(S.status==='waiting') bar = joined ? 'Waiting for an opponent… share the QR.' : 'Enter a name to join.';
  else if(S.status==='over') bar = S.winner==='draw' ? '🏁 Draw.' :
    (S.winner===S.you ? '🏆 You win!' : '💥 You lose.');
  else if(S.armed) bar = `Power-up armed (${S.powerup_names[S.armed]}) — your next tap uses it.`;
  else if(flagMode) bar = 'FLAG mode — tap a box to flag/unflag (instant, final).';
  else if(S.players.length < 2) bar = 'Solo — opens are instant. Share the QR for a 2nd player to enable the 5s veto.';
  else bar = 'Tap a box to open (5s; opponent can tap it to cancel).';
  document.getElementById('bar').textContent = bar;
  const fb = document.getElementById('flagbtn');
  fb.textContent = '🚩 Flag mode: ' + (flagMode ? 'ON' : 'OFF');
  fb.className = flagMode ? 'on' : '';
  // power-ups
  const counts = {};
  S.powerups.forEach(k => counts[k]=(counts[k]||0)+1);
  document.getElementById('pw').innerHTML = Object.keys(counts).map(k =>
    `<button class="${S.armed==k?'armed':''}" onclick="arm(${k})">`+
    `${S.powerup_names[k]} ×${counts[k]}</button>`).join('') ||
    '<span style="color:#8b949e;font-size:12px">No power-ups yet — clear empty areas.</span>';
  // board
  const b = document.getElementById('board');
  b.style.gridTemplateColumns = `repeat(${S.w},30px)`;
  const pend = {};
  (S.pending||[]).forEach(p => pend[p.r+','+p.c] = p);
  b.innerHTML = '';
  for(let r=0;r<S.h;r++) for(let c=0;c<S.w;c++){
    const cell = S.cells[r][c], d = document.createElement('div');
    d.className = 'c';
    if(cell.s==='open'){ d.classList.add('open');
      if(cell.n>0){ d.textContent=cell.n; d.classList.add('n'+cell.n); } }
    else if(cell.s==='mine'){ d.classList.add('mine'); d.textContent='💣'; }
    else if(cell.s==='flag'){ d.classList.add('flag');
      if(!cell.own) d.classList.add('mine-other'); d.textContent='🚩'; }
    else if(cell.s==='pending'){ d.classList.add('pending');
      const p = pend[r+','+c];
      d.textContent = (p?('⏳'+p.left):'⏳'); }
    if(S.status==='playing'){
      // Flag mode (tap) works on touch + desktop; right-click is a
      // desktop shortcut. An armed power-up always consumes the tap.
      d.onclick = () => send({t: (flagMode && !S.armed) ? 'flag' : 'click', r, c});
      d.oncontextmenu = ev => { ev.preventDefault(); send({t:'flag', r, c}); };
    }
    b.appendChild(d);
  }
}
connect();
</script>
</body>
</html>
